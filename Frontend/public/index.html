<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-container">
        <h2 class="auth-title">Login</h2>

        <form id="loginForm" class="auth-form" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="loginUser">User Name</label>
            <input
              type="text"
              id="loginUser"
              class="form-input"
              autocomplete="off"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              autocomplete="off"
              required
            />
          </div>

          <button type="submit" class="auth-button auth-button-primary">
            Login
          </button>

          <p class="auth-footer">
            Don't have an account?
            <a href="register.html">Register</a>
          </p>
        </form>
      </div>
    </div>
    <script src="/js/script.js"></script>
  </body>
</html>
